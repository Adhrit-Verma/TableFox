services:
  postgres:
    image: postgres:16
    container_name: dbmap-postgres
    environment:
      POSTGRES_DB: dbmap_demo
      POSTGRES_USER: dbmap_admin
      POSTGRES_PASSWORD: dbmap-admin-demo-only
    ports:
      - "55432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - dbmap-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbmap_admin -d dbmap_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dbmap-postgres-data:
